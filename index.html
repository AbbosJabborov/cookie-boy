<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>plate. — uy oshxonasi uchun sun'iy intellekt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F6F4EC; --ink:#161611; --forest:#1F3B2C; --tomato:#E4572E; --mustard:#E8A93B;
    --line: rgba(22,22,17,0.14); --radius: 14px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{ background:var(--paper); color:var(--ink); font-family:'Work Sans', sans-serif; line-height:1.5; -webkit-font-smoothing:antialiased; overflow-x:hidden; }
  .display{ font-family:'Archivo Black', sans-serif; text-transform:uppercase; letter-spacing:-0.01em; }
  .mono{ font-family:'IBM Plex Mono', monospace; }
  a{color:inherit;}
  .wrap{ max-width:1120px; margin:0 auto; padding:0 28px; }
  section{ padding:88px 0; position:relative; }
  @media(max-width:720px){ section{ padding:56px 0; } }

  nav{ position:sticky; top:0; z-index:50; background:rgba(246,244,236,0.9); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
  nav .wrap{ display:flex; align-items:center; justify-content:space-between; padding-top:16px; padding-bottom:16px; gap:16px; }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{ width:30px; height:30px; border-radius:7px; background:var(--forest); display:flex; align-items:center; justify-content:center; color:var(--mustard); font-family:'Archivo Black'; font-size:15px; }
  .brand-name{ font-family:'Archivo Black'; font-size:16px; }
  .nav-links{ display:flex; gap:22px; font-size:13px; font-weight:600; flex:1; }
  .nav-links a{ opacity:0.72; transition:opacity .15s; }
  .nav-links a:hover{ opacity:1; }
  @media(max-width:820px){ .nav-links{ display:none; } }
  .nav-right{ display:flex; align-items:center; gap:12px; }
  .lang-toggle{ display:flex; border:1.5px solid var(--ink); border-radius:100px; overflow:hidden; font-family:'IBM Plex Mono'; font-size:12px; font-weight:700; }
  .lang-btn{ padding:8px 13px; cursor:pointer; background:transparent; border:none; color:var(--ink); transition:background .15s, color .15s; }
  .lang-btn.active{ background:var(--ink); color:var(--paper); }

  .hero{ padding-top:64px; padding-bottom:32px; }
  .hero-grid{ display:grid; grid-template-columns:1.15fr 0.85fr; gap:56px; align-items:center; }
  @media(max-width:900px){ .hero-grid{ grid-template-columns:1fr; } }
  .eyebrow{ display:inline-flex; align-items:center; gap:8px; font-family:'IBM Plex Mono'; font-size:12.5px; background:var(--forest); color:var(--paper); padding:6px 12px; border-radius:100px; margin-bottom:24px; }
  .eyebrow::before{ content:''; width:7px; height:7px; border-radius:50%; background:var(--mustard); }
  h1.display{ font-size:clamp(30px, 4.2vw, 50px); line-height:1.08; }
  h1 .accent{ color:var(--tomato); }
  .hero-sub{ margin-top:22px; max-width:54ch; font-size:clamp(15.5px,1.8vw,17.5px); color:rgba(22,22,17,0.72); }
  .hero-cta{ margin-top:30px; display:flex; gap:14px; flex-wrap:wrap; align-items:center; }
  .btn{ font-family:'IBM Plex Mono'; font-size:13px; font-weight:600; padding:14px 22px; border-radius:100px; border:1.5px solid var(--ink); display:inline-flex; align-items:center; gap:8px; transition:transform .15s, background .15s, color .15s; cursor:pointer; background:transparent; }
  .btn-solid{ background:var(--ink); color:var(--paper); }
  .btn-solid:hover{ transform:translateY(-2px); background:var(--forest); border-color:var(--forest); }
  .btn-ghost:hover{ transform:translateY(-2px); background:var(--ink); color:var(--paper); }
  .platform-note{ margin-top:16px; font-family:'IBM Plex Mono'; font-size:12px; opacity:0.55; }

  .phone{ width:258px; margin:0 auto; background:var(--ink); border-radius:34px; padding:12px; box-shadow:0 40px 70px -30px rgba(22,22,17,0.45); }
  .phone-screen{ background:var(--paper); border-radius:24px; overflow:hidden; height:470px; display:flex; flex-direction:column; }
  .phone-status{ display:flex; justify-content:space-between; padding:12px 18px 0; font-family:'IBM Plex Mono'; font-size:10.5px; opacity:0.5; }
  .phone-head{ padding:16px 18px 8px; }
  .phone-head .greet{ font-size:11px; opacity:0.55; font-family:'IBM Plex Mono'; }
  .phone-head .recipe{ font-family:'Archivo Black'; font-size:16px; margin-top:5px; }
  .phone-head .cost{ font-family:'IBM Plex Mono'; font-size:12.5px; color:var(--tomato); margin-top:4px; font-weight:600; }
  .phone-check{ padding:6px 18px; display:flex; flex-direction:column; gap:6px; }
  .prow{ display:flex; align-items:center; gap:8px; font-size:12px; }
  .prow .ok{ color:var(--forest); font-weight:700; }
  .prow .miss{ color:var(--tomato); font-weight:700; }
  .phone-budget{ margin:auto 18px 18px; background:var(--forest); color:var(--paper); border-radius:12px; padding:14px; text-align:center; }
  .phone-budget .lbl{ font-family:'IBM Plex Mono'; font-size:10px; opacity:0.7; }
  .phone-budget .verdict{ font-family:'Archivo Black'; font-size:14px; margin-top:4px; color:var(--mustard); }

  .kicker{ font-family:'IBM Plex Mono'; font-size:12.5px; color:var(--tomato); letter-spacing:0.06em; margin-bottom:16px; }

  /* USP band */
  .usp-band{ background:var(--forest); color:var(--paper); border-radius:28px; margin:0 20px; text-align:center; }
  .usp-band .wrap{ padding-top:64px; padding-bottom:64px; }
  .usp-band .kicker{ color:var(--mustard); justify-content:center; display:flex; }
  .usp-line{ font-family:'Archivo Black'; text-transform:uppercase; font-size:clamp(19px,2.8vw,30px); max-width:26ch; margin:0 auto; line-height:1.32; }
  .usp-line em{ font-style:normal; color:var(--mustard); }
  .module-chips{ display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:30px; }
  .module-chip{ font-family:'IBM Plex Mono'; font-size:12.5px; border:1px solid rgba(246,244,236,0.35); padding:8px 14px; border-radius:100px; }

  /* Problem story */
  .problem-block{ background:var(--ink); color:var(--paper); border-radius:28px; margin:0 20px; }
  .problem-block .wrap{ padding-top:72px; padding-bottom:72px; }
  .problem-block h2.display{ font-size:clamp(23px,3.2vw,36px); max-width:20ch; line-height:1.12; margin-bottom:36px; }
  .story-quote{ font-size:16.5px; line-height:1.75; max-width:64ch; color:rgba(246,244,236,0.85); }
  .story-quote p{ margin-bottom:14px; }
  .story-quote p.hi{ padding-left:16px; border-left:2px solid var(--tomato); color:var(--paper); font-weight:500; }
  .actual-problem{ margin-top:44px; padding-top:36px; border-top:1px solid rgba(246,244,236,0.16); }
  .actual-problem .big{ font-family:'Archivo Black'; text-transform:uppercase; font-size:clamp(18px,2.4vw,26px); max-width:22ch; line-height:1.3; }
  .actual-problem .big em{ font-style:normal; color:var(--mustard); }

  /* Solution steps */
  .steps-row{ display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-top:36px; }
  @media(max-width:760px){ .steps-row{ grid-template-columns:1fr; } }
  .step-card{ border:1px solid var(--line); border-radius:var(--radius); padding:24px; background:#fff; }
  .step-card .snum{ font-family:'IBM Plex Mono'; font-size:12px; color:var(--tomato); }
  .step-card p{ font-size:15px; margin-top:10px; color:rgba(22,22,17,0.75); }

  .sub-card{ background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:26px; margin-top:20px; box-shadow:0 30px 60px -35px rgba(22,22,17,0.3); }
  .sub-card .dtitle{ font-family:'IBM Plex Mono'; font-size:12px; opacity:0.5; margin-bottom:14px; }
  .toggle-row{ display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; }
  .toggle-btn{ flex:1; min-width:150px; font-family:'IBM Plex Mono'; font-size:12.5px; font-weight:600; padding:12px 14px; border-radius:10px; border:1.5px solid var(--line); background:var(--paper); cursor:pointer; text-align:left; transition:border-color .15s, background .15s; }
  .toggle-btn .tname{ font-size:14px; font-weight:700; display:block; margin-bottom:3px; font-family:'Work Sans'; }
  .toggle-btn.active{ border-color:var(--forest); background:rgba(31,59,44,0.06); }
  .sub-total{ display:flex; justify-content:space-between; align-items:center; border-top:1px dashed var(--line); padding-top:16px; }
  .sub-total .tlabel{ font-family:'IBM Plex Mono'; font-size:12px; opacity:0.55; }
  .sub-total .tvalue{ font-family:'Archivo Black'; font-size:22px; }
  .sub-delta{ margin-top:12px; text-align:center; padding:10px; border-radius:10px; font-family:'IBM Plex Mono'; font-size:12.5px; font-weight:600; }
  .sub-delta.same{ background:rgba(31,59,44,0.1); color:var(--forest); }
  .sub-delta.more{ background:rgba(228,87,46,0.12); color:var(--tomato); }
  .sub-explain{ margin-top:12px; font-size:13.5px; color:rgba(22,22,17,0.65); line-height:1.6; }

  /* Shopping assistant */
  .shop-search{ font-family:'IBM Plex Mono'; font-size:13px; background:#fff; border:1px solid var(--line); border-radius:100px; padding:12px 18px; display:inline-flex; align-items:center; gap:10px; margin-bottom:28px; }
  .shop-cards{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; }
  @media(max-width:900px){ .shop-cards{ grid-template-columns:repeat(2,1fr); } }
  @media(max-width:520px){ .shop-cards{ grid-template-columns:1fr; } }
  .shop-card{ border:1px solid var(--line); border-radius:var(--radius); padding:22px; background:#fff; }
  .shop-card .sname{ font-family:'Archivo Black'; font-size:15px; }
  .shop-card .sprice{ font-family:'IBM Plex Mono'; font-size:19px; margin-top:10px; font-weight:600; }
  .shop-card .sstatus{ font-family:'IBM Plex Mono'; font-size:11.5px; margin-top:8px; padding:4px 10px; border-radius:100px; display:inline-block; }
  .sstatus.full{ background:rgba(31,59,44,0.12); color:var(--forest); }
  .sstatus.missing{ background:rgba(228,87,46,0.12); color:var(--tomato); }
  .sstatus.alt{ background:rgba(232,169,59,0.2); color:#8a6412; }
  .map-chips{ display:flex; gap:10px; flex-wrap:wrap; margin-top:22px; }
  .map-chip{ font-family:'IBM Plex Mono'; font-size:12px; opacity:0.6; border:1px solid var(--line); padding:6px 12px; border-radius:100px; }

  /* AI chat demo */
  .chat-wrap{ display:grid; grid-template-columns:1fr 1fr; gap:40px; align-items:start; }
  @media(max-width:900px){ .chat-wrap{ grid-template-columns:1fr; } }
  .chat-copy p{ color:rgba(22,22,17,0.7); font-size:15.5px; margin-bottom:12px; max-width:46ch; }
  .chat-card{ background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:22px; min-height:280px; }
  .chat-q{ display:block; width:100%; text-align:left; font-family:'Work Sans'; font-size:14px; font-weight:500; background:var(--paper); border:1.5px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px; cursor:pointer; transition:border-color .15s; }
  .chat-q.active{ border-color:var(--forest); background:rgba(31,59,44,0.06); }
  .chat-a{ display:none; background:var(--forest); color:var(--paper); border-radius:12px; padding:14px 16px; font-size:13.5px; line-height:1.6; margin-top:-4px; margin-bottom:14px; }
  .chat-a.show{ display:block; animation:fadeUp .3s ease; }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  /* Timer demo */
  .timer-card{ background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:26px; margin-top:24px; text-align:center; }

  /* Dark cooking-screen phone mockup */
  .phone-dark{ width:258px; margin:0 auto; background:#000; border-radius:34px; padding:12px; box-shadow:0 40px 70px -30px rgba(22,22,17,0.5); }
  .phone-dark .phone-screen-dark{ background:#141414; border-radius:24px; overflow:hidden; height:490px; display:flex; flex-direction:column; color:#fff; }
  .phone-dark .phone-status-dark{ display:flex; justify-content:space-between; padding:12px 18px 0; font-family:'IBM Plex Mono'; font-size:10.5px; color:rgba(255,255,255,0.45); }
  .cook-video{ position:relative; margin:14px 14px 0; height:140px; border-radius:16px; background:#000; overflow:hidden; flex-shrink:0; }
  .cook-live{ position:absolute; top:10px; right:10px; background:var(--tomato); color:#fff; font-family:'IBM Plex Mono'; font-size:9.5px; font-weight:700; padding:4px 9px; border-radius:100px; letter-spacing:0.04em; }
  .cook-play{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:42px; height:42px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; font-size:15px; color:#111; }
  .cook-body{ padding:14px 18px 0; flex:1; display:flex; flex-direction:column; }
  .cook-step{ font-family:'IBM Plex Mono'; font-size:11px; color:var(--mustard); font-weight:600; }
  .cook-title{ font-family:'Work Sans'; font-weight:700; font-size:18px; margin-top:7px; }
  .cook-desc{ font-size:12.5px; color:rgba(255,255,255,0.5); margin-top:8px; line-height:1.55; }
  .cook-timer-row{ margin-top:auto; display:flex; align-items:flex-end; justify-content:space-between; padding:14px 0 4px; }
  .cook-timer{ font-family:'Archivo Black'; font-size:28px; }
  .cook-timer .unit{ font-size:10.5px; font-family:'IBM Plex Mono'; color:rgba(255,255,255,0.45); font-weight:400; margin-left:6px; text-transform:none; letter-spacing:0; }
  .cook-ai-orb{ width:42px; height:42px; border-radius:50%; background:radial-gradient(circle at 30% 30%, #b28dfd, #6c5ce7); display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
  .cook-nav{ display:flex; gap:10px; padding:14px 18px 18px; }
  .cook-btn{ flex:1; text-align:center; font-family:'IBM Plex Mono'; font-size:11.5px; font-weight:600; padding:12px; border-radius:100px; border:none; cursor:pointer; }
  .cook-btn.prev{ background:#232323; color:#fff; }
  .cook-btn.next{ background:#fff; color:#111; }
  .cook-btn:disabled{ opacity:0.35; cursor:default; }
  .timer-q{ font-family:'IBM Plex Mono'; font-size:13px; opacity:0.6; margin-bottom:16px; }
  .timer-btns{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .timer-btn{ font-family:'IBM Plex Mono'; font-size:13px; font-weight:600; padding:12px 18px; border-radius:100px; border:1.5px solid var(--line); background:var(--paper); cursor:pointer; transition:border-color .15s; }
  .timer-btn.active{ border-color:var(--forest); background:rgba(31,59,44,0.08); }
  .timer-result{ margin-top:18px; font-size:14px; color:rgba(22,22,17,0.75); min-height:22px; }

  /* filters */
  .filter-group{ margin-bottom:28px; }
  .filter-group h3{ font-family:'IBM Plex Mono'; font-size:12px; text-transform:uppercase; color:var(--forest); margin-bottom:14px; }
  .filter-chips{ display:flex; gap:8px; flex-wrap:wrap; }
  .filter-chip{ font-family:'IBM Plex Mono'; font-size:12px; border:1px solid var(--line); background:#fff; padding:7px 13px; border-radius:100px; }

  /* compare */
  .compare-scroll{ overflow-x:auto; }
  .compare-table{ width:100%; border-collapse:collapse; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; min-width:560px; }
  .compare-table th, .compare-table td{ padding:14px 18px; text-align:left; border-bottom:1px solid var(--line); font-size:13.5px; }
  .compare-table th{ font-family:'IBM Plex Mono'; font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color:rgba(22,22,17,0.55); background:#fff; }
  .compare-table tr:last-child td{ border-bottom:none; }
  .yes{ color:var(--forest); font-weight:700; }
  .no{ color:var(--tomato); font-weight:700; }
  .plate-col{ background:rgba(31,59,44,0.06); font-weight:600; }
  th.plate-col{ background:var(--forest); color:var(--paper); }

  /* roadmap */
  .roadmap{ display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
  @media(max-width:820px){ .roadmap{ grid-template-columns:1fr; } }
  .phase{ background:#fff; padding:24px 20px; }
  .phase.mvp{ background:rgba(31,59,44,0.06); }
  .phase .pnum{ font-family:'IBM Plex Mono'; font-size:11.5px; color:var(--tomato); }
  .phase h3{ font-size:15.5px; margin:9px 0 13px; }
  .phase ul{ list-style:none; display:flex; flex-direction:column; gap:7px; }
  .phase li{ font-size:13.5px; color:rgba(22,22,17,0.72); }

  .cta{ text-align:center; }
  .cta h2.display{ font-size:clamp(24px,3.8vw,40px); max-width:20ch; margin:0 auto 18px; }
  .cta p{ color:rgba(22,22,17,0.68); max-width:48ch; margin:0 auto 30px; font-size:15.5px; }
  .cta-btns{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }

  footer{ border-top:1px solid var(--line); padding:28px 0; text-align:center; }
  footer .fmark{ font-family:'IBM Plex Mono'; font-size:12px; opacity:0.6; }

  ::selection{ background:var(--mustard); color:var(--ink); }
  @media (prefers-reduced-motion: reduce){ html{ scroll-behavior:auto; } *{ animation:none !important; transition:none !important; } }
  .reveal{ opacity:0; transform:translateY(18px); transition:opacity .6s ease, transform .6s ease; }
  .reveal.in{ opacity:1; transform:translateY(0); }
</style>
</head>
<body>

<nav>
  <div class="wrap">
    <div class="brand"><div class="brand-mark">p</div><div class="brand-name">plate.</div></div>
    <div class="nav-links">
      <a href="#problem" data-i18n="nav.problem"></a>
      <a href="#solution" data-i18n="nav.solution"></a>
      <a href="#shopping" data-i18n="nav.shopping"></a>
      <a href="#assistant" data-i18n="nav.assistant"></a>
      <a href="#roadmap" data-i18n="nav.roadmap"></a>
    </div>
    <div class="nav-right">
      <a href="#cta" class="btn btn-solid" style="padding:10px 18px; font-size:12px;" data-i18n="nav.cta"></a>
      <div class="lang-toggle">
        <button class="lang-btn" data-lang="uz">UZ</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </div>
  </div>
</nav>

<section class="hero">
  <div class="wrap">
    <div class="hero-grid">
      <div>
        <div class="eyebrow" data-i18n="hero.eyebrow"></div>
        <h1 class="display" data-i18n="hero.title"></h1>
        <p class="hero-sub" data-i18n="hero.sub"></p>
        <div class="hero-cta">
          <a href="#solution" class="btn btn-solid" data-i18n="hero.cta1"></a>
          <a href="#assistant" class="btn btn-ghost" data-i18n="hero.cta2"></a>
        </div>
        <div class="platform-note" data-i18n="hero.platform"></div>
      </div>

      <div class="phone">
        <div class="phone-screen">
          <div class="phone-status"><span>9:41</span><span>plate.</span></div>
          <div class="phone-head">
            <div class="greet mono" data-i18n="phone.label"></div>
            <div class="recipe" data-i18n="phone.dish"></div>
            <div class="cost" data-i18n="phone.cost"></div>
          </div>
          <div class="phone-check">
            <div class="prow"><span class="ok">✅</span> <span data-i18n="phone.item1"></span></div>
            <div class="prow"><span class="ok">✅</span> <span data-i18n="phone.item2"></span></div>
            <div class="prow"><span class="miss">🛒</span> <span data-i18n="phone.item3"></span></div>
            <div class="prow"><span class="miss">🛒</span> <span data-i18n="phone.item4"></span></div>
          </div>
          <div class="phone-budget">
            <div class="lbl mono" data-i18n="phone.budget"></div>
            <div class="verdict" data-i18n="phone.verdict"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="usp-band">
  <div class="wrap">
    <div class="kicker" data-i18n="usp.kicker"></div>
    <div class="usp-line reveal" data-i18n-html="usp.line"></div>
    <div class="module-chips reveal">
      <span class="module-chip" data-i18n="usp.m1"></span>
      <span class="module-chip" data-i18n="usp.m2"></span>
      <span class="module-chip" data-i18n="usp.m3"></span>
      <span class="module-chip" data-i18n="usp.m4"></span>
      <span class="module-chip" data-i18n="usp.m5"></span>
    </div>
  </div>
</section>

<section class="problem-block" id="problem">
  <div class="wrap">
    <div class="kicker" data-i18n="problem.kicker"></div>
    <h2 class="display" data-i18n="problem.title"></h2>
    <div class="story-quote reveal">
      <p data-i18n="problem.s1"></p>
      <p data-i18n="problem.s2"></p>
      <p class="hi" data-i18n="problem.s3"></p>
      <p data-i18n="problem.s4"></p>
      <p data-i18n="problem.s5"></p>
      <p class="hi" data-i18n="problem.s6"></p>
    </div>
    <div class="actual-problem reveal">
      <div class="big" data-i18n-html="problem.actual"></div>
    </div>
  </div>
</section>

let currentLang = 'uz';

function applyLang(lang){
  currentLang = lang;
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (I18N[lang][key] !== undefined) el.textContent = I18N[lang][key];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (I18N[lang][key] !== undefined) el.innerHTML = I18N[lang][key];
  });
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  updateSubExplain();
  updateCookScreen();
}

document.querySelectorAll('.lang-btn').forEach(btn => btn.addEventListener('click', () => applyLang(btn.dataset.lang)));

// Substitution / budget widget
const subBtns = document.querySelectorAll('.toggle-btn');
const subTotal = document.getElementById('subTotal');
const subDelta = document.getElementById('subDelta');
const subExplain = document.getElementById('subExplain');
let activeSub = 'parmesan';

function updateSubExplain(){
  const price = activeSub === 'parmesan' ? 85000 : 102000;
  subTotal.textContent = price.toLocaleString('en-US');
  if (activeSub === 'parmesan'){
    subDelta.className = 'sub-delta same';
    subDelta.textContent = '';
    subExplain.textContent = I18N[currentLang]['solution.explain1'];
  } else {
    const delta = 102000 - 85000;
    subDelta.className = 'sub-delta more';
    const currency = I18N[currentLang]['currency.short'];
    subDelta.textContent = (currentLang === 'uz'
      ? '+' + delta.toLocaleString('en-US') + ' ' + currency + ' — narx oshdi'
      : '+' + delta.toLocaleString('en-US') + ' ' + currency + ' more than the original');
    subExplain.textContent = I18N[currentLang]['solution.explain2'];
  }
}

subBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    subBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeSub = btn.dataset.key === 'parmesan' ? 'parmesan' : 'grana';
    updateSubExplain();
  });
});

// Cooking screen mockup
let cookStep = 4;
const cookStepEl = document.getElementById('cookStepLabel');
const cookTitleEl = document.getElementById('cookTitle');
const cookDescEl = document.getElementById('cookDesc');
const cookTimerEl = document.getElementById('cookTimer');
const cookPrevBtn = document.getElementById('cookPrev');
const cookNextBtn = document.getElementById('cookNext');

function updateCookScreen(){
  const t = I18N[currentLang];
  cookStepEl.textContent = t['cookscreen.step' + cookStep];
  cookTitleEl.textContent = t['cookscreen.title' + cookStep];
  cookDescEl.textContent = t['cookscreen.desc' + cookStep];
  cookTimerEl.innerHTML = t['cookscreen.timer' + cookStep] + ' <span class="unit">' + t['cookscreen.remaining'] + '</span>';
  cookPrevBtn.disabled = cookStep <= 3;
  cookNextBtn.disabled = cookStep >= 5;
}

cookPrevBtn.addEventListener('click', () => { if (cookStep > 3){ cookStep--; updateCookScreen(); } });
cookNextBtn.addEventListener('click', () => { if (cookStep < 5){ cookStep++; updateCookScreen(); } });

// Chat demo
document.querySelectorAll('.chat-q').forEach(q => {
  q.addEventListener('click', () => {
    const id = q.dataset.answer;
    const answer = document.getElementById(id);
    const showing = answer.classList.contains('show');
    document.querySelectorAll('.chat-a').forEach(a => a.classList.remove('show'));
    document.querySelectorAll('.chat-q').forEach(qq => qq.classList.remove('active'));
    if (!showing){
      answer.classList.add('show');
      q.classList.add('active');
    }
  });
});

// Timer demo
const timerResult = document.getElementById('timerResult');
document.querySelectorAll('.timer-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.timer-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    timerResult.textContent = I18N[currentLang]['timer.r.' + btn.dataset.result];
  });
});

// Scroll reveal
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
}, { threshold: 0.15 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

applyLang('uz');
</script>
