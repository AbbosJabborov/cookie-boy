<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>plate. — AI oshpaz yordamchisi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper: #F6F4EC;
            --ink: #161611;
            --forest: #1F3B2C;
            --tomato: #E4572E;
            --mustard: #E8A93B;
            --line: rgba(22, 22, 17, 0.14);
            --radius: 14px;
            --ai-glow: #7C5CFC;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background: var(--paper);
            color: var(--ink);
            font-family: 'Work Sans', sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .display {
            font-family: 'Archivo Black', sans-serif;
            text-transform: uppercase;
            letter-spacing: -0.01em;
        }
        .mono {
            font-family: 'IBM Plex Mono', monospace;
        }
        a {
            color: inherit;
            text-decoration: none;
        }
        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 28px;
        }
        section {
            padding: 88px 0;
            position: relative;
        }
        @media(max-width:720px) {
            section {
                padding: 56px 0;
            }
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(246, 244, 236, 0.92);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--line);
        }
        nav .wrap {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 14px;
            padding-bottom: 14px;
            gap: 14px;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .brand-mark {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            background: var(--forest);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--mustard);
            font-family: 'Archivo Black';
            font-size: 15px;
        }
        .brand-name {
            font-family: 'Archivo Black';
            font-size: 16px;
        }
        .nav-links {
            display: flex;
            gap: 22px;
            font-size: 13px;
            font-weight: 600;
            flex: 1;
        }
        .nav-links a {
            opacity: 0.7;
            transition: opacity .15s;
        }
        .nav-links a:hover {
            opacity: 1;
        }
        @media(max-width:820px) {
            .nav-links {
                display: none;
            }
        }
        .nav-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .lang-toggle {
            display: flex;
            border: 1.5px solid var(--ink);
            border-radius: 100px;
            overflow: hidden;
            font-family: 'IBM Plex Mono';
            font-size: 11px;
            font-weight: 700;
        }
        .lang-btn {
            padding: 7px 12px;
            cursor: pointer;
            background: transparent;
            border: none;
            color: var(--ink);
            transition: background .15s, color .15s;
        }
        .lang-btn.active {
            background: var(--ink);
            color: var(--paper);
        }

        .hero {
            padding-top: 64px;
            padding-bottom: 28px;
        }
        .hero-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 48px;
            align-items: center;
        }
        @media(max-width:900px) {
            .hero-grid {
                grid-template-columns: 1fr;
            }
        }
        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: 'IBM Plex Mono';
            font-size: 12px;
            background: var(--ai-glow);
            color: #fff;
            padding: 6px 14px;
            border-radius: 100px;
            margin-bottom: 20px;
            letter-spacing: 0.03em;
        }
        .eyebrow::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #fff;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.35;
            }
        }
        h1.display {
            font-size: clamp(30px, 4.2vw, 50px);
            line-height: 1.06;
        }
        h1 .accent {
            color: var(--ai-glow);
        }
        .hero-sub {
            margin-top: 22px;
            max-width: 52ch;
            font-size: clamp(15px, 1.8vw, 17px);
            color: rgba(22, 22, 17, 0.7);
            line-height: 1.6;
        }
        .hero-cta {
            margin-top: 28px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn {
            font-family: 'IBM Plex Mono';
            font-size: 13px;
            font-weight: 600;
            padding: 13px 20px;
            border-radius: 100px;
            border: 1.5px solid var(--ink);
            display: inline-flex;
            align-items: center;
            gap: 7px;
            transition: transform .15s, background .15s, color .15s;
            cursor: pointer;
            background: transparent;
        }
        .btn-solid {
            background: var(--ink);
            color: var(--paper);
        }
        .btn-solid:hover {
            transform: translateY(-2px);
            background: var(--forest);
            border-color: var(--forest);
        }
        .btn-ghost:hover {
            transform: translateY(-2px);
            background: var(--ink);
            color: var(--paper);
        }
        .btn-accent {
            background: var(--ai-glow);
            color: #fff;
            border-color: var(--ai-glow);
        }
        .btn-accent:hover {
            transform: translateY(-2px);
            background: #6848e0;
            border-color: #6848e0;
        }

        .phone {
            width: 260px;
            margin: 0 auto;
            background: var(--ink);
            border-radius: 34px;
            padding: 12px;
            box-shadow: 0 40px 70px -30px rgba(22, 22, 17, 0.45);
        }
        .phone-screen {
            background: #1a1a1a;
            border-radius: 24px;
            overflow: hidden;
            height: 500px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .phone-status {
            display: flex;
            justify-content: space-between;
            padding: 12px 18px 0;
            font-family: 'IBM Plex Mono';
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
        }
        .phone-video-area {
            background: #0d0d0d;
            margin: 8px 10px;
            border-radius: 10px;
            flex: 0 0 28%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .phone-video-area .play-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #1a1a1a;
        }
        .phone-video-area .live-tag {
            position: absolute;
            top: 6px;
            right: 8px;
            font-family: 'IBM Plex Mono';
            font-size: 9px;
            background: var(--tomato);
            color: #fff;
            padding: 2px 7px;
            border-radius: 100px;
        }
        .phone-instruction {
            flex: 1;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .phone-step-badge {
            font-family: 'IBM Plex Mono';
            font-size: 10px;
            color: var(--mustard);
            letter-spacing: 0.05em;
        }
        .phone-instruction .step-title {
            font-family: 'Work Sans';
            font-weight: 700;
            font-size: 15px;
            color: #fff;
            line-height: 1.3;
        }
        .phone-instruction .step-detail {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.5;
        }
        .phone-timer-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: auto;
        }
        .phone-timer {
            font-family: 'IBM Plex Mono';
            font-size: 28px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.02em;
        }
        .phone-timer-label {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.45);
        }
        .phone-nav {
            display: flex;
            gap: 6px;
            padding: 0 16px 14px;
        }
        .phone-nav-btn {
            flex: 1;
            padding: 9px;
            border-radius: 100px;
            text-align: center;
            font-family: 'IBM Plex Mono';
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.7);
            background: transparent;
            transition: all .15s;
        }
        .phone-nav-btn.primary {
            background: #fff;
            color: #1a1a1a;
            border-color: #fff;
        }
        .phone-ai-fab {
            position: absolute;
            bottom: 60px;
            right: 10px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--ai-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            box-shadow: 0 6px 20px rgba(124, 92, 252, 0.5);
            cursor: pointer;
        }

        .story-block {
            background: var(--ink);
            color: var(--paper);
            border-radius: 28px;
            margin: 0 20px;
        }
        .story-block .wrap {
            padding-top: 72px;
            padding-bottom: 72px;
        }
        .kicker {
            font-family: 'IBM Plex Mono';
            font-size: 12px;
            color: var(--mustard);
            letter-spacing: 0.06em;
            margin-bottom: 14px;
        }
        .story-block h2.display {
            font-size: clamp(22px, 3.2vw, 36px);
            max-width: 22ch;
            line-height: 1.12;
            margin-bottom: 32px;
        }
        .story-narrative {
            max-width: 58ch;
            font-size: 15.5px;
            line-height: 1.75;
            color: rgba(246, 244, 236, 0.85);
        }
        .story-narrative p {
            margin-bottom: 14px;
            padding-left: 16px;
            border-left: 2px solid rgba(246, 244, 236, 0.2);
        }
        .story-narrative .highlight {
            color: var(--mustard);
            font-weight: 600;
        }
        .story-pain-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: rgba(246, 244, 236, 0.12);
            border: 1px solid rgba(246, 244, 236, 0.12);
            border-radius: var(--radius);
            overflow: hidden;
            margin-top: 36px;
        }
        @media(max-width:760px) {
            .story-pain-grid {
                grid-template-columns: 1fr;
            }
        }
        .pain-item {
            background: var(--ink);
            padding: 22px 18px;
        }
        .pain-item .picon {
            font-size: 20px;
            margin-bottom: 8px;
        }
        .pain-item .ptitle {
            font-size: 14px;
            font-weight: 600;
        }
        .pain-item .pdesc {
            font-size: 13px;
            color: rgba(246, 244, 236, 0.6);
            margin-top: 4px;
            line-height: 1.4;
        }

        .usp-band {
            text-align: center;
            padding: 72px 0;
            background: #fff;
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
        }
        .usp-band .kicker {
            color: var(--ai-glow);
            justify-content: center;
            display: flex;
        }
        .usp-line {
            font-family: 'Archivo Black';
            text-transform: uppercase;
            font-size: clamp(19px, 2.8vw, 30px);
            max-width: 26ch;
            margin: 0 auto;
            line-height: 1.3;
        }
        .usp-line em {
            font-style: normal;
            color: var(--ai-glow);
        }
        .usp-sub {
            margin-top: 18px;
            font-family: 'IBM Plex Mono';
            font-size: 13.5px;
            opacity: 0.55;
            max-width: 48ch;
            margin-left: auto;
            margin-right: auto;
        }

        .how-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 44px;
            align-items: start;
        }
        @media(max-width:900px) {
            .how-grid {
                grid-template-columns: 1fr;
            }
        }
        .how-copy .kicker {
            color: var(--ai-glow);
        }
        .how-copy h2.display {
            font-size: clamp(22px, 3.2vw, 34px);
            margin-bottom: 16px;
        }
        .how-copy p {
            color: rgba(22, 22, 17, 0.7);
            font-size: 15px;
            margin-bottom: 12px;
            max-width: 46ch;
            line-height: 1.6;
        }
        .how-steps {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .how-step {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 20px 18px;
            display: flex;
            gap: 14px;
            align-items: flex-start;
        }
        .how-step .step-num {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--ai-glow);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Archivo Black';
            font-size: 15px;
            flex-shrink: 0;
        }
        .how-step .step-content h4 {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 3px;
        }
        .how-step .step-content p {
            font-size: 13px;
            color: rgba(22, 22, 17, 0.6);
            max-width: 40ch;
            line-height: 1.5;
        }

        .feature-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
        }
        @media(max-width:820px) {
            .feature-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media(max-width:560px) {
            .feature-grid {
                grid-template-columns: 1fr;
            }
        }
        .feat-card {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 22px 18px;
            transition: transform .2s, box-shadow .2s;
        }
        .feat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px -12px rgba(22, 22, 17, 0.15);
        }
        .feat-card .ficon {
            font-size: 26px;
            margin-bottom: 10px;
        }
        .feat-card h4 {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .feat-card p {
            font-size: 13px;
            color: rgba(22, 22, 17, 0.6);
            line-height: 1.5;
        }
        .feat-card.star {
            border-color: var(--ai-glow);
            border-width: 2px;
            position: relative;
        }
        .feat-card.star::after {
            content: '⭐';
            position: absolute;
            top: -10px;
            right: 14px;
            font-size: 18px;
        }

        .demo-card {
            background: #fff;
            border: 2px solid var(--line);
            border-radius: var(--radius);
            padding: 26px;
            box-shadow: 0 30px 60px -35px rgba(22, 22, 17, 0.3);
        }
        .demo-card .dtitle {
            font-family: 'Archivo Black';
            font-size: 18px;
        }
        .demo-card .dsub {
            font-family: 'IBM Plex Mono';
            font-size: 11px;
            opacity: 0.5;
            margin-top: 3px;
        }
        .demo-list {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .demo-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--line);
            cursor: pointer;
            user-select: none;
            flex-wrap: wrap;
        }
        .demo-item:last-child {
            border-bottom: none;
        }
        .demo-item .box {
            width: 20px;
            height: 20px;
            border-radius: 5px;
            border: 1.5px solid var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            flex-shrink: 0;
            transition: background .15s, border-color .15s;
        }
        .demo-item.owned .box {
            background: var(--forest);
            border-color: var(--forest);
            color: var(--paper);
        }
        .demo-item .iname {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            min-width: 100px;
        }
        .demo-item .iprice {
            font-family: 'IBM Plex Mono';
            font-size: 12px;
            opacity: 0.6;
        }
        .demo-item.owned .iprice {
            opacity: 0.3;
            text-decoration: line-through;
        }
        .demo-item .itag {
            font-family: 'IBM Plex Mono';
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 100px;
            white-space: nowrap;
        }
        .demo-item.owned .itag {
            background: rgba(31, 59, 44, 0.12);
            color: var(--forest);
        }
        .demo-item:not(.owned) .itag {
            background: rgba(228, 87, 46, 0.12);
            color: var(--tomato);
        }
        .demo-item .ai-note {
            width: 100%;
            font-family: 'IBM Plex Mono';
            font-size: 10px;
            color: var(--ai-glow);
            margin-top: 2px;
            padding-left: 30px;
            display: none;
        }
        .demo-item:not(.owned) .ai-note {
            display: block;
        }
        .demo-totals {
            margin-top: 18px;
            border-top: 1px dashed var(--line);
            padding-top: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .demo-totals .tlabel {
            font-family: 'IBM Plex Mono';
            font-size: 11px;
            opacity: 0.5;
        }
        .demo-totals .tvalue {
            font-family: 'Archivo Black';
            font-size: 19px;
        }
        .demo-verdict {
            margin-top: 12px;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            font-family: 'IBM Plex Mono';
            font-size: 12px;
            font-weight: 600;
            transition: background .2s, color .2s;
        }
        .demo-verdict.good {
            background: rgba(31, 59, 44, 0.12);
            color: var(--forest);
        }
        .demo-verdict.bad {
            background: rgba(228, 87, 46, 0.12);
            color: var(--tomato);
        }
        .demo-hint {
            margin-top: 8px;
            text-align: center;
            font-family: 'IBM Plex Mono';
            font-size: 10px;
            opacity: 0.4;
        }

        .compare-scroll {
            overflow-x: auto;
        }
        .compare-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            overflow: hidden;
            min-width: 600px;
        }
        .compare-table th,
        .compare-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--line);
            font-size: 13.5px;
        }
        .compare-table th {
            font-family: 'IBM Plex Mono';
            font-size: 10.5px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: rgba(22, 22, 17, 0.5);
            background: #fff;
        }
        .compare-table tr:last-child td {
            border-bottom: none;
        }
        .yes {
            color: var(--forest);
            font-weight: 700;
        }
        .no {
            color: var(--tomato);
            font-weight: 700;
        }
        .some {
            opacity: 0.55;
        }
        .plate-col {
            background: rgba(124, 92, 252, 0.06);
            font-weight: 600;
        }
        th.plate-col {
            background: var(--ai-glow);
            color: #fff;
        }

        .audience-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        @media(max-width:760px) {
            .audience-grid {
                grid-template-columns: 1fr;
            }
        }
        .aud-card {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 22px;
            background: #fff;
        }
        .aud-card h3 {
            font-family: 'IBM Plex Mono';
            font-size: 11px;
            text-transform: uppercase;
            color: var(--ai-glow);
            margin-bottom: 12px;
        }
        .aud-card ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }
        .aud-card li {
            font-size: 14px;
        }

        .roadmap {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--line);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            overflow: hidden;
        }
        @media(max-width:820px) {
            .roadmap {
                grid-template-columns: 1fr;
            }
        }
        .phase {
            background: #fff;
            padding: 24px 20px;
        }
        .phase .pnum {
            font-family: 'IBM Plex Mono';
            font-size: 11px;
            color: var(--ai-glow);
        }
        .phase h3 {
            font-size: 15px;
            margin: 8px 0 12px;
        }
        .phase ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }
        .phase li {
            font-size: 13.5px;
            color: rgba(22, 22, 17, 0.7);
        }

        .biz-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        @media(max-width:760px) {
            .biz-grid {
                grid-template-columns: 1fr;
            }
        }
        .biz-card {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 22px;
            background: #fff;
        }
        .biz-card h3 {
            font-family: 'IBM Plex Mono';
            font-size: 11px;
            text-transform: uppercase;
            color: var(--forest);
            margin-bottom: 12px;
        }
        .biz-card ul {

        let currentLang = 'uz';
        const CURRENCY = { uz: "so'm", en: "UZS" };

        function applyLang(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (I18N[lang][key] !== undefined) el.textContent = I18N[lang][key];
            });
            document.querySelectorAll('[data-i18n-html]').forEach(el => {
                const key = el.getAttribute('data-i18n-html');
                if (I18N[lang][key] !== undefined) el.innerHTML = I18N[lang][key];
            });
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.lang === lang);
            });
            recalc();
        }

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => applyLang(btn.dataset.lang));
        });

        const items = document.querySelectorAll('#demoList .demo-item');
        const totalEl = document.getElementById('demoTotal');
        const verdictEl = document.getElementById('demoVerdict');
        const BUDGET = 80000;

        function fmt(n) { return n.toLocaleString('en-US') + ' ' + CURRENCY[currentLang]; }

        function recalc() {
            let total = 0;
            items.forEach(item => {
                if (!item.classList.contains('owned')) total += parseInt(item.dataset.price, 10);
            });
            totalEl.textContent = total.toLocaleString('en-US');
            const within = total <= BUDGET;
            verdictEl.className = 'demo-verdict ' + (within ? 'good' : 'bad');
            if (currentLang === 'uz') {
                verdictEl.textContent = within ?
                    '✓ ' + fmt(BUDGET) + ' byudjetingiz doirasida — bugun pishirish mumkin' :
                    '✕ ' + fmt(BUDGET) + ' byudjetdan ' + fmt(total - BUDGET) + ' ga oshib ketdi';
            } else {
                verdictEl.textContent = within ?
                    '✓ Within your ' + fmt(BUDGET) + ' budget — can cook today' :
                    '✕ Over your ' + fmt(BUDGET) + ' budget by ' + fmt(total - BUDGET);
            }
        }

        items.forEach(item => {
            item.addEventListener('click', () => {
                item.classList.toggle('owned');
                const box = item.querySelector('.box');
                const tag = item.querySelector('.itag');
                const owned = item.classList.contains('owned');
                box.textContent = owned ? '✓' : '';
                tag.textContent = I18N[currentLang][owned ? 'demo.owned' : 'demo.buy'];
                recalc();
            });
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
        }, { threshold: 0.12 });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        applyLang('uz');
    </script>
