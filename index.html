let currentLang = 'uz';
const CURRENCY = { uz: "so'm", en: "UZS" };

function applyLang(lang){
  currentLang = lang;
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (I18N[lang][key] !== undefined) el.textContent = I18N[lang][key];
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (I18N[lang][key] !== undefined) el.innerHTML = I18N[lang][key];
  });
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  recalc();
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});

// Demo card interactivity
const items = document.querySelectorAll('#demoList .demo-item');
const totalEl = document.getElementById('demoTotal');
const verdictEl = document.getElementById('demoVerdict');
const BUDGET = 50000;

function fmt(n){ return n.toLocaleString('en-US') + ' ' + CURRENCY[currentLang]; }

function recalc(){
  let total = 0;
  items.forEach(item => {
    if (!item.classList.contains('owned')) total += parseInt(item.dataset.price, 10);
  });
  totalEl.textContent = total.toLocaleString('en-US');
  const within = total <= BUDGET;
  verdictEl.className = 'demo-verdict ' + (within ? 'good' : 'bad');
  if (currentLang === 'uz'){
    verdictEl.textContent = within
      ? '✓ ' + fmt(BUDGET) + ' byudjetingiz doirasida — bugun pishirish mumkin'
      : '✕ ' + fmt(BUDGET) + ' byudjetdan ' + fmt(total - BUDGET) + ' ga oshib ketdi';
  } else {
    verdictEl.textContent = within
      ? '✓ Within your ' + fmt(BUDGET) + ' budget — can cook today'
      : '✕ Over your ' + fmt(BUDGET) + ' budget by ' + fmt(total - BUDGET);
  }
}

items.forEach(item => {
  item.addEventListener('click', () => {
    item.classList.toggle('owned');
    const box = item.querySelector('.box');
    const tag = item.querySelector('.itag');
    const owned = item.classList.contains('owned');
    box.textContent = owned ? '✓' : '';
    tag.textContent = I18N[currentLang][owned ? 'demo.owned' : 'demo.buy'];
    recalc();
  });
});

// Scroll reveal
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
}, { threshold: 0.15 });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

// init
applyLang('uz');
</script>
